<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Swati Enterprises account for faster checkout, order tracking and exclusive health offers.">
  <title>Register – Swati Enterprises</title>
  <link rel="icon" href="images/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script type="module" src="js/app.js" defer></script>
</head>
<body>
<div id="page-loader"><div class="loader-ring"></div></div>
<div id="toast-container"></div>
<div class="auth-page" style="padding-block:var(--space-8)">
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(25,118,210,0.2);filter:blur(80px);top:-100px;right:-100px;pointer-events:none"></div>
  <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(15,157,88,0.2);filter:blur(60px);bottom:-50px;left:-50px;pointer-events:none"></div>

  <div class="auth-card animate-scale-in" style="max-width:500px">
    <div style="display:flex;justify-content:center;margin-bottom:var(--space-6)">
      <a href="index.html" class="logo" style="flex-direction:column;align-items:center;gap:var(--space-2)">
        <div class="logo-icon" style="width:54px;height:54px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
        <span class="logo-name" style="font-size:var(--text-lg)">Swati Enterprises</span>
      </a>
    </div>
    <div class="auth-header">
      <h1 class="auth-title">Create Account 🎉</h1>
      <p class="auth-subtitle">Join 25 lakh+ customers enjoying genuine medicines at best prices</p>
    </div>

    <form id="register-form" novalidate>
      <div class="form-group"><label class="field-label" for="reg-name">Full Name *</label>
        <div class="input-group"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input class="input" type="text" id="reg-name" placeholder="Your full name" autocomplete="name" required></div>
      </div>
      <div class="form-group"><label class="field-label" for="reg-email">Email Address *</label>
        <div class="input-group"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><input class="input" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email" required></div>
      </div>
      <div class="form-group"><label class="field-label" for="reg-phone">Mobile Number *</label>
        <div class="input-group"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14 19.79 19.79 0 0 1 1.65 5.4 2 2 0 0 1 3.62 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.9a16 16 0 0 0 6 6z"/></svg><input class="input" type="tel" id="reg-phone" placeholder="10-digit mobile number" autocomplete="tel" required></div>
      </div>
      <div class="form-group"><label class="field-label" for="reg-password">Create Password *</label>
        <div class="input-group" style="position:relative"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input class="input" type="password" id="reg-password" placeholder="Min 8 chars, 1 uppercase, 1 number" autocomplete="new-password" required>
          <button type="button" class="toggle-password" data-target="reg-password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--clr-text-muted);display:flex" aria-label="Toggle password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <!-- Password Strength -->
        <div class="password-strength">
          <div class="strength-bars"><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div></div>
          <span class="strength-label"></span>
        </div>
      </div>
      <div class="form-group"><label class="field-label" for="reg-confirm">Confirm Password *</label>
        <div class="input-group" style="position:relative"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input class="input" type="password" id="reg-confirm" placeholder="Re-enter your password" autocomplete="new-password" required>
          <button type="button" class="toggle-password" data-target="reg-confirm" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--clr-text-muted);display:flex" aria-label="Toggle password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div style="margin-bottom:var(--space-5)">
        <label style="display:flex;align-items:flex-start;gap:var(--space-3);cursor:pointer;font-size:var(--text-xs);color:var(--clr-text-muted)">
          <input type="checkbox" style="accent-color:var(--clr-primary);margin-top:2px;flex-shrink:0" required>
          <span>I agree to the <a href="#" style="color:var(--clr-primary)">Terms of Service</a> and <a href="#" style="color:var(--clr-primary)">Privacy Policy</a>. I consent to receive health tips and offers from Swati Enterprises.</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" style="margin-bottom:var(--space-4)">
        Create My Account →
      </button>
    </form>

    <p style="text-align:center;font-size:var(--text-sm);color:var(--clr-text-muted)">
      Already have an account? <a href="login.html" style="color:var(--clr-primary);font-weight:600">Sign In →</a>
    </p>
    <p style="text-align:center;margin-top:var(--space-4)"><a href="index.html" style="font-size:var(--text-xs);color:var(--clr-text-muted)">← Back to Home</a></p>
  </div>
</div>
</body>
</html>
