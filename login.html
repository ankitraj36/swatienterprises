<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Swati Enterprises account for order tracking, reorders, and exclusive offers.">
  <title>Login – Swati Enterprises</title>
  <link rel="icon" href="images/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script type="module" src="js/app.js" defer></script>
</head>
<body>
<div id="page-loader"><div class="loader-ring"></div></div>
<div id="toast-container"></div>
<div class="auth-page">
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(15,157,88,0.2);filter:blur(80px);top:-100px;left:-100px;pointer-events:none"></div>
  <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(79,195,247,0.2);filter:blur(60px);bottom:-50px;right:-50px;pointer-events:none"></div>

  <div class="auth-card animate-scale-in">
    <!-- Logo -->
    <div style="display:flex;justify-content:center;margin-bottom:var(--space-6)">
      <a href="index.html" class="logo" style="flex-direction:column;align-items:center;gap:var(--space-2)">
        <div class="logo-icon" style="width:54px;height:54px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
        <span class="logo-name" style="font-size:var(--text-lg)">Swati Enterprises</span>
      </a>
    </div>

    <div class="auth-header">
      <h1 class="auth-title">Welcome Back 👋</h1>
      <p class="auth-subtitle">Sign in to access your orders, wishlist, and exclusive offers</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="field-label" for="login-email">Email Address</label>
        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email" required>
        </div>
      </div>
      <div class="form-group">
        <label class="field-label" for="login-password">
          Password
          <a href="#" style="float:right;font-size:var(--text-xs);color:var(--clr-primary);font-weight:500">Forgot Password?</a>
        </label>
        <div class="input-group" style="position:relative">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="input" type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="toggle-password" data-target="login-password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--clr-text-muted);display:flex;align-items:center" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5)">
        <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer;font-size:var(--text-sm)">
          <input type="checkbox" style="accent-color:var(--clr-primary)"> Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" style="margin-bottom:var(--space-4)">
        Sign In →
      </button>
    </form>

    <div class="divider-text"><span>Or continue with</span></div>

    <button class="btn btn-ghost w-full" style="margin-top:var(--space-4);margin-bottom:var(--space-5);gap:var(--space-3)" onclick="window.App?.showToast('info','Coming Soon','Google Sign-in coming soon!')">
      <svg viewBox="0 0 24 24" style="width:20px;height:20px"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <p style="text-align:center;font-size:var(--text-sm);color:var(--clr-text-muted)">
      Don't have an account? <a href="register.html" style="color:var(--clr-primary);font-weight:600">Create Account →</a>
    </p>
    <p style="text-align:center;margin-top:var(--space-4)"><a href="index.html" style="font-size:var(--text-xs);color:var(--clr-text-muted)">← Back to Home</a></p>
  </div>
</div>
<script type="module">
  import Storage from './js/storage.js';
  const t = Storage.getTheme();
  document.documentElement.setAttribute('data-theme', t);
</script>
</body>
</html>
